apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: video-app
spec:
  replicas: 2           # Run 2 backend API instances (load balanced)
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: video-backend:latest
          imagePullPolicy: Never
          # imagePullPolicy: Never = use local image (we built it ourselves)
          # In real cloud deployment, you'd push to DockerHub and use "Always"
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres-service:5432/video_transcoding"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MINIO_BUCKET
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "1000m"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
          # Health check: Kubernetes pings /health every 10 seconds
          # If it fails 3 times, Kubernetes restarts the pod automatically
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30   # Wait 30s before first check (let app start)
            periodSeconds: 10
            failureThreshold: 3

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: video-app
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: LoadBalancer
  # LoadBalancer = expose this service externally with a stable IP/hostname
  # Traffic is distributed across all backend pods automatically